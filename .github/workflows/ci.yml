name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-todo-app/todo-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-todo-app/todo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  web-e2e:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-todo-app/todo-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-todo-app/todo-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser and deps
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  mobile-jest:
    name: Mobile Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-todo-app/todo-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-todo-app/todo-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test -- --runInBand
